<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>📱 라이브 마스터 - iOS 모바일 제어</title>
    <!-- Official Apple Fonts from CDN -->
    <link rel="stylesheet" href="https://www.apple.com/wss/fonts?family=SF+Pro+KR&v=2" type="text/css" />
    <link rel="stylesheet" href="https://www.apple.com/wss/fonts?families=SF+Pro,v3|SF+Pro+Icons,v3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #000000; /* Pure OLED Black */
            --bg-panel: rgba(28, 28, 30, 0.85); /* iOS Dark Mode Secondary System Background */
            --bg-card: rgba(28, 28, 30, 0.94); /* iOS Grouped Cell Background */
            --bg-input: rgba(120, 120, 128, 0.24); /* iOS system input fill */
            --border-light: rgba(255, 255, 255, 0.08); /* 0.5px subtle line */
            --text-main: #ffffff; /* iOS primary text */
            --text-muted: #8e8e93; /* iOS secondary text (System Gray) */
            --accent: #0a84ff; /* iOS Blue */
            --accent-glow: rgba(10, 132, 255, 0.15);
            --success: #30d158; /* iOS Green */
            --danger: #ff453a; /* iOS Red */
            --danger-glow: rgba(255, 69, 58, 0.2);
            --gold: #ffd60a; /* iOS Yellow/Gold */
            --gold-glow: rgba(255, 214, 10, 0.2);
            --radius-lg: 12px; /* iOS standard rounded corners */
            --radius-md: 10px;
            --radius-sm: 8px;
            --font-sans: 'SF Pro KR', 'SF Pro Text', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Pretendard', sans-serif;
            --transition-smooth: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            --glass-stroke: 0.5px solid rgba(255, 255, 255, 0.1);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        body.theme-pink {
            --bg-body: #000000;
            --bg-panel: rgba(44, 24, 40, 0.8);
            --bg-card: rgba(52, 32, 48, 0.94);
            --text-muted: #d0c8d4;
            --accent: #ff375f; /* iOS Pink */
            --accent-glow: rgba(255, 55, 95, 0.15);
            --gold: #ff375f;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            position: relative;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: var(--font-sans);
            margin: 0;
            min-height: 100vh;
            padding: 0 16px calc(100px + env(safe-area-inset-bottom)) 16px;
            -webkit-font-smoothing: antialiased;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        /* iOS Large Title Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin: 0 -16px 16px -16px;
            padding: calc(16px + env(safe-area-inset-top)) 20px 12px 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .eyebrow { 
            color: var(--text-muted); 
            font-size: 12px; 
            font-weight: 500; 
            letter-spacing: -0.1px;
            margin-bottom: 4px;
        }

        .header h1 { 
            margin: 0; 
            font-size: 28px; 
            line-height: 1.15; 
            font-weight: 800; 
            letter-spacing: -0.6px;
        }

        .ios-link-btn {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.2s ease;
        }
        .ios-link-btn:active {
            opacity: 0.5;
        }
        .ios-link-btn.danger {
            color: var(--danger);
        }
        
        .reaction-pill {
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 12px;
            background: rgba(120, 120, 128, 0.16); 
            border-radius: 20px !important;
            border: 0;
            font-size: 13px;
            font-weight: 600;
            height: 34px;
        }

        .reaction-pill span { 
            font-size: 13px; 
            font-weight: 600; 
        }

        /* iOS Native Tab Bar */
        .tabs {
            position: fixed; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            z-index: 50; 
            display: grid; 
            grid-template-columns: repeat(3, minmax(0, 1fr));
            padding: 6px 10px calc(8px + env(safe-area-inset-bottom)) 10px;
            background: rgba(20, 20, 20, 0.94); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 0 !important;
            box-shadow: 0 -1px 0 rgba(0, 0, 0, 0.2);
        }

        .tab-btn {
            min-height: 48px; 
            padding: 4px 2px; 
            border: 0; 
            background: transparent; 
            color: #8e8e93;
            font-size: 10px; 
            font-weight: 500; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 3px;
            font-family: var(--font-sans);
            transition: opacity 0.15s ease;
            border-radius: 0 !important;
        }

        .tab-btn i { font-size: 18px; }

        .tab-btn.active { 
            color: var(--accent);
            background: transparent;
            box-shadow: none;
        }

        .tab-btn:active {
            opacity: 0.6;
        }

        .tab-content { 
            display: none; 
            animation: fadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1); 
            padding-bottom: 20px; 
        }

        .tab-content.active { display: block; }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(6px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .status-grid { 
            display: grid; 
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
            gap: 10px; 
            margin: 4px 0 16px 0; 
        }

        .stat-card {
            min-height: 68px; 
            padding: 10px 14px; 
            background: var(--bg-panel); 
            border: var(--glass-stroke);
            border-radius: var(--radius-lg) !important;
            box-shadow: var(--shadow-card);
        }

        .stat-card span { 
            display: block; 
            color: var(--text-muted); 
            font-size: 11px; 
            font-weight: 600; 
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        .stat-card strong { 
            display: block; 
            color: var(--text-main); 
            font-size: 20px; 
            font-weight: 700; 
            letter-spacing: -0.3px;
        }

        /* iOS Grouped List Style */
        .group-box {
            background: var(--bg-panel); 
            border: var(--glass-stroke); 
            border-radius: 12px !important;
            padding: 0; 
            margin-bottom: 18px; 
            box-shadow: var(--shadow-card);
            overflow: hidden;
        }

        .group-title { 
            color: var(--text-muted); 
            font-weight: 400; 
            font-size: 13px; 
            margin: 18px 16px 6px 16px; 
            text-transform: uppercase;
            letter-spacing: -0.1px;
            display: flex; 
            align-items: center; 
            gap: 6px;
            border-bottom: 0;
            padding-bottom: 0;
        }

        .group-title i { color: var(--accent); font-size: 14px; }

        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        
        /* iOS List Rows */
        .ios-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 48px;
            padding: 8px 16px;
            background: transparent;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
        }

        .ios-row:last-child {
            border-bottom: 0;
        }

        .ios-row-label {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ios-row-label i {
            width: 20px;
            text-align: center;
            color: var(--accent);
        }

        .ios-row-control {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        /* iOS Pill Buttons */
        button {
            min-height: 44px; 
            background: rgba(255, 255, 255, 0.08); 
            color: var(--accent); 
            border: 0;
            border-radius: 10px !important;
            padding: 10px 16px; 
            font-weight: 600; 
            font-size: 15px; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            gap: 6px;
            flex: 1; 
            font-family: var(--font-sans);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        button:active { 
            background: rgba(255, 255, 255, 0.16); 
            transform: scale(0.97); 
        }

        button.primary { 
            background: var(--accent) !important; 
            color: #ffffff !important; 
            border: 0 !important;
            box-shadow: 0 2px 8px rgba(10, 132, 255, 0.25) !important;
        }

        button.primary:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        button.danger { 
            background: var(--danger) !important; 
            color: #ffffff !important; 
            border: 0 !important;
            box-shadow: 0 2px 8px rgba(255, 69, 58, 0.25) !important;
        }

        button.danger:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        button.icon-only { flex: none; width: 44px; padding: 0; border-radius: 50% !important; }

        /* iOS Inputs */
        input[type="text"], input[type="number"], select, textarea {
            background: rgba(120, 120, 128, 0.24); 
            border: 0; 
            border-radius: 10px !important;
            padding: 10px 12px; 
            color: var(--text-main);
            font-size: 16px !important; /* Prevents auto-zoom on Safari iOS */
            font-weight: 400; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: var(--font-sans);
            transition: var(--transition-smooth);
        }

        textarea { min-height: 100px; resize: vertical; line-height: 1.4; }

        input:focus, select:focus, textarea:focus { 
            outline: none; 
            background: rgba(120, 120, 128, 0.32);
        }

        /* iOS Switches */
        .apple-switch { position: relative; display: inline-block; width: 51px; height: 31px; flex-shrink: 0; }
        .apple-switch input { opacity: 0; width: 0; height: 0; }
        .apple-slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(120, 120, 128, 0.36); border-radius: 16px !important; transition: .2s cubic-bezier(0.16, 1, 0.3, 1); }
        .apple-slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; top: 2px; background-color: #ffffff; border-radius: 50% !important; transition: .2s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 3px 8px rgba(0,0,0,0.15); }
        .apple-switch input:checked + .apple-slider { background-color: var(--success); }
        body.theme-pink .apple-switch input:checked + .apple-slider { background-color: var(--accent); }
        .apple-switch input:checked + .apple-slider:before { transform: translateX(20px); }

        .color-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
        
        /* Color input overrides */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50% !important;
            cursor: pointer;
            background: none;
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 50% !important;
        }

        .log-box { 
            background: rgba(0, 0, 0, 0.3); 
            border-radius: 8px !important;
            padding: 12px; 
            height: 200px; 
            overflow-y: auto; 
            font-size: 12px; 
            color: var(--text-main); 
            line-height: 1.6; 
            margin-bottom: 8px; 
        }

        .log-item { 
            padding: 6px 0; 
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.06); 
        }

        .log-item:last-child { border-bottom: 0; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="eyebrow" style="display: flex; align-items: center; gap: 8px;">
                <span>Live Master</span>
                <a href="/controller?mode=desktop" class="ios-link-btn"><i class="fa-solid fa-laptop"></i> PC 버전</a>
                <a href="/logout" class="ios-link-btn danger"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</a>
            </div>
            <h1>모바일 제어</h1>
        </div>
        <label class="reaction-pill">
            <i class="fa-solid fa-eye" id="icon-reaction"></i>
            <span id="lbl-reaction-mode">대기</span>
            <div class="apple-switch"><input type="checkbox" id="chk-reaction" onchange="toggleOption('reaction_mode')"><span class="apple-slider"></span></div>
        </label>
    </div>

    <div id="active-broadcast-area" style="display: none;">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'tab-match')"><i class="fa-solid fa-stopwatch"></i><span>대결 제어</span></button>
            <button class="tab-btn" onclick="openTab(event, 'tab-neon')"><i class="fa-solid fa-wand-magic-sparkles"></i><span>조명 & 이펙트</span></button>
            <button class="tab-btn" onclick="openTab(event, 'tab-news')"><i class="fa-solid fa-bullhorn"></i><span>설정 & 로그</span></button>
        </div>

        <!-- 1. 대결 제어 탭 -->
        <div id="tab-match" class="tab-content active">
            <div class="status-grid">
                <div class="stat-card"><span>타이머</span><strong id="stat-timer">00:00</strong></div>
                <div class="stat-card"><span>대결 상태</span><strong id="stat-match-state">대기</strong></div>
                <div class="stat-card"><span>총합 점수</span><strong id="stat-total">0</strong></div>
                <div class="stat-card"><span>방송 목표</span><strong id="stat-goal">0</strong></div>
            </div>
            
            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-stopwatch"></i> 타이머 제어</div>
                
                <div style="padding: 16px;">
                    <!-- 원터치 퀵 프리셋 설정 -->
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;">시간 퀵 설정</div>
                    <div class="control-row" style="margin-bottom: 16px; flex-wrap: wrap; gap: 8px;">
                        <button type="button" onclick="quickSetTimer(3)">3분</button>
                        <button type="button" onclick="quickSetTimer(5)">5분</button>
                        <button type="button" onclick="quickSetTimer(10)">10분</button>
                        <button type="button" onclick="quickSetTimer(1)">1분</button>
                    </div>
                    
                    <!-- 시간 추가 제어 -->
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;">시간 추가</div>
                    <div class="control-row" style="margin-bottom: 20px; gap: 8px;">
                        <button type="button" onclick="addTimerTime(30)" style="background: rgba(10,132,255,0.1); color: var(--accent);">+30초</button>
                        <button type="button" onclick="addTimerTime(60)" style="background: rgba(10,132,255,0.1); color: var(--accent);">+1분</button>
                    </div>
                    
                    <!-- 수동 입력 제어 -->
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;">수동 시간 설정</div>
                    <div class="control-row" style="margin-bottom: 16px; gap: 8px;">
                        <input type="number" id="in-timer-m" value="3" placeholder="분" style="text-align: center;"> <span style="font-weight:600; font-size:15px;">분</span>
                        <input type="number" id="in-timer-s" value="0" placeholder="초" style="text-align: center;"> <span style="font-weight:600; font-size:15px;">초</span>
                    </div>
                    
                    <div class="control-row" style="gap: 8px;">
                        <button onclick="setTimer()"><i class="fa-solid fa-rotate-right"></i> 시간 적용</button>
                        <button class="primary" onclick="toggleTimer()" id="btn-timer-toggle"><i class="fa-solid fa-play"></i> 시작</button>
                    </div>
                </div>
            </div>

            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-tv"></i> 대결 화면 설정</div>
                
                <div class="ios-row">
                    <div class="ios-row-label"><i class="fa-solid fa-square-poll-horizontal"></i><span>위젯 표시</span></div>
                    <div class="ios-row-control">
                        <div class="apple-switch"><input type="checkbox" id="chk-match" onchange="toggleMatch()"><span class="apple-slider"></span></div>
                    </div>
                </div>
                <div class="ios-row">
                    <div class="ios-row-label"><i class="fa-solid fa-fire" style="color:var(--danger);"></i><span>불꽃 효과</span></div>
                    <div class="ios-row-control">
                        <div class="apple-switch"><input type="checkbox" id="chk-match-fire" onchange="toggleMatchFire()"><span class="apple-slider"></span></div>
                    </div>
                </div>
                <div style="padding: 16px;">
                    <input type="text" id="in-match-title" placeholder="대결 타이틀 입력 (선택)" oninput="updateMatchTitle()">
                </div>
            </div>
        </div>

        <!-- 2. 조명 & 이펙트 탭 -->
        <div id="tab-neon" class="tab-content">
            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-lightbulb"></i> 리액션 조명 제어</div>
                
                <div style="padding: 16px;">
                    <div class="control-group" style="gap: 10px;">
                        <button id="btn-rainbow" onclick="triggerNeon('RAINBOW')" style="background: linear-gradient(90deg, #ff453a, #ff9f0a, #ffd60a, #34c759, #007aff, #5856d6); color: #fff; border-radius: 20px !important;"><i class="fa-solid fa-rainbow"></i> 무지개 네온</button>
                        <div class="control-row" style="gap: 8px;">
                            <button onclick="triggerNeon('AUDI')"><i class="fa-solid fa-car"></i> 아우디 빔</button>
                            <button onclick="triggerNeon('OFF')" class="danger"><i class="fa-solid fa-power-off"></i> 전체 끄기</button>
                        </div>
                    </div>
                    <div style="height: 0.5px; background: rgba(255,255,255,0.1); margin: 16px 0;"></div>
                    <div id="color-slots" class="color-grid"></div>
                </div>
            </div>

            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-rocket"></i> 특수 자막 발사기</div>
                <div style="padding: 16px;">
                    <div class="control-row launch-row" style="gap: 8px;">
                        <input type="text" id="in-up-text" placeholder="화면 중앙 발사 문구" onkeydown="if(event.key==='Enter') triggerUpText()">
                        <button class="primary" style="flex: none; width: 85px;" onclick="triggerUpText()"><i class="fa-solid fa-paper-plane"></i> 발사</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. 설정 & 로그 탭 -->
        <div id="tab-news" class="tab-content">
            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-sliders"></i> 기능 & 환경 설정</div>
                
                <div class="ios-row">
                    <div class="ios-row-label"><span>테마 설정</span></div>
                    <div class="ios-row-control" style="width: 140px;">
                        <select id="sel-theme" onchange="updateTheme()"><option value="default">기본 다크</option><option value="pink">네온 핑크</option></select>
                    </div>
                </div>
                <div class="ios-row">
                    <div class="ios-row-label"><span>목표 설정</span></div>
                    <div class="ios-row-control" style="width: 140px;">
                        <input type="number" id="in-goal" placeholder="목표 점수" onchange="updateGoal()" style="text-align: right; background: transparent; padding: 4px;">
                    </div>
                </div>
                <div class="ios-row">
                    <div class="ios-row-label"><span>점수 팝업 표시</span></div>
                    <div class="ios-row-control">
                        <div class="apple-switch"><input type="checkbox" id="chk-popup" onchange="toggleOption('popup_enabled')"><span class="apple-slider"></span></div>
                    </div>
                </div>
                <div class="ios-row">
                    <div class="ios-row-label"><span>1등 탈환 알림</span></div>
                    <div class="ios-row-control">
                        <div class="apple-switch"><input type="checkbox" id="chk-takeover" onchange="toggleOption('takeover_enabled')"><span class="apple-slider"></span></div>
                    </div>
                </div>
            </div>

            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-bullhorn"></i> 전광판 설정</div>
                
                <div class="ios-row">
                    <div class="ios-row-label"><span>화면에 표시하기</span></div>
                    <div class="ios-row-control">
                        <div class="apple-switch"><input type="checkbox" id="chk-ticker" onchange="toggleOption('ticker_enabled')"><span class="apple-slider"></span></div>
                    </div>
                </div>
                <div style="padding: 16px;">
                    <div style="margin-bottom: 16px;">
                        <label style="font-size: 13px; font-weight:bold; color:var(--text-muted);">스크롤 속도: <span id="lbl-speed">70</span></label>
                        <input type="range" id="in-speed" min="1" max="100" onchange="updateSpeed(this.value)" style="width:100%; margin-top:10px; accent-color: var(--accent); background: transparent;">
                    </div>
                    <textarea id="in-ticker" placeholder="문구를 입력하세요. (엔터로 구분)" style="height: 100px;" oninput="updateTickerText()"></textarea>
                </div>
            </div>

            <div class="group-box">
                <div class="group-title"><i class="fa-solid fa-list-ol"></i> 실시간 로그</div>
                
                <div style="padding: 16px;">
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;">랭킹 로그</div>
                    <div id="log-box-ranking" class="log-box" style="height: 120px;"></div>
                    <button style="width: 100%; margin-bottom: 16px; padding: 8px; font-size: 13px; background: rgba(255,69,58,0.15); color: var(--danger);" onclick="clearLogs('rank')"><i class="fa-solid fa-trash-can"></i> 랭킹 로그 비우기</button>
                    
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px;">대결 로그</div>
                    <div id="log-box-match" class="log-box" style="height: 120px;"></div>
                    <button style="width: 100%; padding: 8px; font-size: 13px; background: rgba(255,69,58,0.15); color: var(--danger);" onclick="clearLogs('match')"><i class="fa-solid fa-trash-can"></i> 대결 로그 비우기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="setup-broadcast-area" style="display: none;">
        <div style="margin: 80px 16px; padding: 40px 24px; text-align: center; background: var(--bg-panel); border: var(--glass-stroke); border-radius: 16px; box-shadow: var(--shadow-card);">
            <div style="font-size: 48px; color: var(--accent); margin-bottom: 24px;">
                <i class="fa-solid fa-hourglass-half"></i>
            </div>
            <h3 style="margin: 0 0 12px 0; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.4px;">방송 대기 중</h3>
            <p style="margin: 0; font-size: 14px; color: var(--text-muted); line-height: 1.6; word-break: keep-all;">
                오늘의 방송이 아직 시작되지 않았습니다.<br>
                PC 제어실에서 플레이어를 등록하고 방송 시작을 진행해주세요.
            </p>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) { 
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active')); 
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); 
            document.getElementById(tabId).classList.add('active'); 
            evt.currentTarget.classList.add('active'); 
        }
        
        let gd = null; let isPushing = false; 
        let serverTimeOffset = 0;
        let lastColorHtml = ""; let lastRankLogHtml = ""; let lastMatchLogHtml = "";

        async function fetchAPI() {
            if (isPushing) return; 
            try { 
                const res = await fetch('/api/data'); const newData = await res.json(); 
                if (newData && newData.server_time) {
                    serverTimeOffset = newData.server_time - Date.now();
                }
                gd = newData;
                if(!gd.bjs) { gd.bjs = []; }
                else { gd.bjs.forEach(bj => { if(bj.contribution === undefined) bj.contribution = bj.score > 0 ? bj.score : 0; }); }
                if(!gd.match_data) gd.match_data = { active: false, fire_effect: false, is_running: false, time_left_ms: 180000, end_time_ms: 0, players: [{name:'팀 A', score:0}, {name:'팀 B', score:0}] };
                if(!gd.bottom_fixed) gd.bottom_fixed = {name: "운영비", score: 0};
                renderUI(); 
            } catch (e) {}
        }

        function pushAPI() {
            if(!gd) return;
            isPushing = true;
            fetch('/api/data', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(gd) }).catch(e => console.error("⚠️ pushAPI Error:", e));
            setTimeout(() => { isPushing = false; }, 80); 
        }

        function readableTextColor(hex) {
            let clean = String(hex || '').replace('#', '').trim();
            if (clean.length === 3) clean = clean.split('').map(ch => ch + ch).join('');
            if (clean.length !== 6) return '#fff';
            let r = parseInt(clean.slice(0, 2), 16);
            let g = parseInt(clean.slice(2, 4), 16);
            let b = parseInt(clean.slice(4, 6), 16);
            return ((r * 299 + g * 587 + b * 114) / 1000) > 170 ? '#1d1d1f' : '#fff';
        }

        function renderUI() {
            if(document.activeElement.tagName === "INPUT" && !document.activeElement.id.startsWith("chk") || document.activeElement.tagName === "TEXTAREA") return;
            
            let isActive = gd.broadcast_active || false;
            document.getElementById('setup-broadcast-area').style.display = isActive ? 'none' : 'block';
            document.getElementById('active-broadcast-area').style.display = isActive ? 'block' : 'none';
            
            const reactionPill = document.querySelector('.reaction-pill');
            if (reactionPill) {
                reactionPill.style.display = isActive ? 'flex' : 'none';
            }
            
            if (!isActive) {
                return;
            }
            
            const setVal = (id, val) => { let el = document.getElementById(id); if(el && el.value != val) el.value = val; };
            const setChk = (id, val) => { let el = document.getElementById(id); if(el && el.checked !== val) el.checked = val; };
            const setHtml = (id, val) => { let el = document.getElementById(id); if(el && el.innerHTML !== val) el.innerHTML = val; };

            setVal('sel-theme', gd.theme || 'default');
            setVal('in-goal', gd.target_goal);
            
            // Handle body theme dynamically
            if (gd.theme === 'pink') {
                document.body.className = 'theme-pink';
            } else {
                document.body.className = '';
            }
            
            setChk('chk-reaction', gd.reaction_mode);
            document.getElementById('icon-reaction').style.color = gd.reaction_mode ? "var(--danger)" : "var(--text-main)";
            document.getElementById('icon-reaction').className = gd.reaction_mode ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
            setHtml('lbl-reaction-mode', gd.reaction_mode ? '리액션' : '대기');
            
            setChk('chk-popup', gd.popup_enabled);
            setChk('chk-takeover', gd.takeover_enabled);
            setChk('chk-match', gd.match_data.active);
            setChk('chk-match-fire', gd.match_data.fire_effect || false);
            setChk('chk-ticker', gd.ticker_enabled);

            let totalScore = (gd.bottom_fixed?.score || 0) + gd.bjs.reduce((sum, bj) => sum + (bj.score || 0), 0);
            setHtml('stat-total', totalScore.toLocaleString());
            setHtml('stat-goal', (gd.target_goal || 0).toLocaleString());

            let currentNeon = (gd.effect_trigger && gd.effect_trigger.color !== 'OFF') ? gd.effect_trigger.color : ''; 
            let rbBtn = document.getElementById('btn-rainbow'); 
            if(currentNeon === 'RAINBOW') { 
                if(rbBtn.innerText.indexOf("끄기") === -1) {
                    rbBtn.innerHTML = "<i class='fa-solid fa-rainbow'></i> 무지개 끄기"; rbBtn.style.background = "#1d1d1f"; rbBtn.style.color = "#fff"; 
                }
            } else { 
                if(rbBtn.innerText.indexOf("네온") === -1) {
                    rbBtn.innerHTML = "<i class='fa-solid fa-rainbow'></i> 무지개 네온"; rbBtn.style.background = "linear-gradient(90deg, #ff453a, #ff9f0a, #ffd60a, #34c759, #007aff, #5856d6)"; rbBtn.style.color = "#fff"; 
                }
            }

            if (!gd.saved_colors) gd.saved_colors = ['#ff0055', '#00e5ff', '#ff9100', '#00ff00']; 
            let colorHtml = ''; 
            gd.saved_colors.forEach((col, i) => { 
                let isAct = (currentNeon === col); 
                let textCol = readableTextColor(col);
                let btnStyle = isAct ? `background:rgba(255,255,255,0.08); color:var(--text-main);` : `background:${col}; color:${textCol};`; 
                colorHtml += `<div class="color-slot" style="background: rgba(120, 120, 128, 0.12); border: 0; border-radius: 10px; padding: 6px 10px; display: flex; align-items: center; gap: 8px;"><input type="color" value="${col}" onchange="gd.saved_colors[${i}]=this.value; pushAPI();" style="width: 28px; height: 28px; border-radius: 50% !important; border: 0; cursor: pointer; padding: 0; overflow: hidden; flex: none;"><button style="${btnStyle}; font-size: 13px; min-height: 28px; padding: 4px 8px; border-radius: 6px !important; flex: 1; border: 0;" onclick="triggerNeon('${col}')">${isAct ? '<i class="fa-solid fa-check"></i> ON' : '적용'}</button></div>`; 
            }); 
            if (lastColorHtml !== colorHtml) { document.getElementById('color-slots').innerHTML = colorHtml; lastColorHtml = colorHtml; }

            let md = gd.match_data; 
            setVal('in-match-title', md.title || ''); 
            
            let timerBtn = document.getElementById('btn-timer-toggle');
            let newTimerHtml = md.is_running ? "<i class='fa-solid fa-pause'></i> 정지" : "<i class='fa-solid fa-play'></i> 시작";
            if (timerBtn.innerHTML !== newTimerHtml) {
                timerBtn.innerHTML = newTimerHtml;
                timerBtn.className = md.is_running ? "danger" : "primary";
            }
            
            let totalSec = Math.max(0, Math.ceil((md.is_running ? Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset)) : md.time_left_ms) / 1000)); 
            setVal('in-timer-m', Math.floor(totalSec / 60)); 
            setVal('in-timer-s', totalSec % 60);
            if (totalSec <= 0) {
                setHtml('stat-timer', '시간종료');
            } else {
                setHtml('stat-timer', `${String(Math.floor(totalSec / 60)).padStart(2, '0')}:${String(totalSec % 60).padStart(2, '0')}`);
            }
            setHtml('stat-match-state', md.active ? (md.is_running ? '진행' : '표시') : '숨김');

            setVal('in-speed', gd.ticker_speed || 70); 
            setHtml('lbl-speed', gd.ticker_speed || 70); 
            setVal('in-ticker', (gd.ticker_text||'').replace(/ \/ /g, '\n')); 

            if (gd.logs) {
                let rankLogHtml = gd.logs.map(log => `<div class="log-item"><span style="color:var(--text-muted);">[${log.time}]</span> <span style="font-weight:900;">${log.name}</span> <span style="color:var(--accent); font-weight:900;">${log.val > 0 ? '+'+log.val.toLocaleString() : log.val.toLocaleString()}점</span></div>`).join('');
                if (lastRankLogHtml !== rankLogHtml) { document.getElementById('log-box-ranking').innerHTML = rankLogHtml; lastRankLogHtml = rankLogHtml; }
            }
            if (gd.match_logs) {
                let matchLogHtml = gd.match_logs.map(log => `<div class="log-item"><span style="color:var(--text-muted);">[${log.time}]</span> <span style="font-weight:900;">${log.name}</span> <span style="color:var(--accent); font-weight:900;">${log.val > 0 ? '+'+log.val.toLocaleString() : log.val.toLocaleString()}점</span></div>`).join('');
                if (lastMatchLogHtml !== matchLogHtml) { document.getElementById('log-box-match').innerHTML = matchLogHtml; lastMatchLogHtml = matchLogHtml; }
            }
        }

        function triggerUpText() { let txt = document.getElementById('in-up-text').value; if (txt.trim() === "") { alert("문구를 먼저 입력해주세요!"); return; } gd.up_trigger = { time: Date.now(), text: txt }; pushAPI(); document.getElementById('in-up-text').value = ''; }
        
        function toggleOption(key) { 
            gd[key] = !gd[key]; 
            if (key === 'reaction_mode') {
                let audio = document.getElementById('bgm-audio');
                let md = gd.match_data;
                
                if (gd[key]) { 
                    if (audio && !audio.paused) { audio.dataset.wasPlaying = "true"; audio.pause(); } else if(audio) { audio.dataset.wasPlaying = "false"; }
                    if (md && md.is_running) {
                        md.time_left_ms = Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset));
                        md.is_running = false;
                        md.was_running_before_reaction = true;
                    }
                } else { 
                    if (audio && audio.dataset.wasPlaying === "true") { audio.play().catch(e=>{}); }
                    if (md && md.was_running_before_reaction) {
                        if(md.time_left_ms <= 0) md.time_left_ms = md.paused_time_left;
                        md.end_time_ms = (Date.now() + serverTimeOffset) + md.time_left_ms;
                        md.is_running = true;
                        md.was_running_before_reaction = false;
                    }
                }
            }
            pushAPI(); 
        }

        function toggleMatch() { gd.match_data.active = !gd.match_data.active; pushAPI(); }
        function toggleMatchFire() { gd.match_data.fire_effect = !gd.match_data.fire_effect; pushAPI(); }
        function updateTheme() { gd.theme = document.getElementById('sel-theme').value; pushAPI(); }
        function updateGoal() { gd.target_goal = parseInt(document.getElementById('in-goal').value)||0; pushAPI(); }
        function triggerNeon(color) { if (!gd.reaction_mode && color !== 'OFF') { alert("👀 리액션 모드(눈알 아이콘)가 켜져있어야 화면에 보입니다."); return; } gd.effect_trigger = {time: Date.now(), color: color, infinite: true}; pushAPI(); }

        function clearLogs(type) { if(type === 'rank') gd.logs = []; if(type === 'match') gd.match_logs = []; pushAPI(); }
        function updateMatchTitle() { gd.match_data.title = document.getElementById('in-match-title').value; pushAPI(); }
        
        function quickSetTimer(m) {
            let ms = m * 60 * 1000;
            gd.match_data.paused_time_left = ms;
            gd.match_data.time_left_ms = ms;
            gd.match_data.is_running = false;
            pushAPI();
        }

        function addTimerTime(seconds) {
            let md = gd.match_data;
            let msToAdd = seconds * 1000;
            if (md.is_running) {
                md.end_time_ms += msToAdd;
            } else {
                md.time_left_ms += msToAdd;
            }
            pushAPI();
        }

        function setTimer() { let ms = ((parseInt(document.getElementById('in-timer-m').value)||0)*60 + (parseInt(document.getElementById('in-timer-s').value)||0))*1000; gd.match_data.paused_time_left = ms; gd.match_data.time_left_ms = ms; gd.match_data.is_running = false; pushAPI(); }
        
        function toggleTimer() { 
            let md = gd.match_data; 
            if(md.is_running) { 
                md.time_left_ms = Math.max(0, md.end_time_ms - (Date.now() + serverTimeOffset)); 
                md.is_running = false; 
                md.was_running_before_reaction = false;
            } else { 
                if(md.time_left_ms <= 0) md.time_left_ms = md.paused_time_left; 
                md.end_time_ms = (Date.now() + serverTimeOffset) + md.time_left_ms; 
                md.is_running = true; 
                md.was_running_before_reaction = false;
            } 
            pushAPI(); 
        }

        function updateSpeed(val) { gd.ticker_speed = parseInt(val); document.getElementById('lbl-speed').innerText = val; pushAPI(); }
        function updateTickerText() { gd.ticker_text = document.getElementById('in-ticker').value.replace(/\n/g, ' / '); pushAPI(); }

        fetchAPI(); setInterval(fetchAPI, 250);
    </script>
</body>
</html>
