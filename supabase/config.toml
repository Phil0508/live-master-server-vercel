# Supabase Configuration for Live Master Server
# Run with: supabase start (local) or link to remote project

project_id = "live-master-server"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324
smtp_port = 54325

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true
ip_version = "IPv4"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3001", "http://localhost:3002"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = true