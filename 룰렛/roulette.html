<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>돌려돌려 돌림판</title>
    <link rel="stylesheet" type="text/css" href="css/roulette.css" />
    <script type="text/javascript" src="js/jquery-3.2.0.min.js"></script>
    <script type="text/javascript" src="js/jquery.color-2.1.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="wrap">
        <h1 contenteditable="true" spellcheck="false">행운의 돌림판</h1>
        <canvas width="600" height="600" class="roulette">지원하지 않는 브라우저입니다. Google Chrome 최신 버전을 사용해주세요.</canvas>
        <div id="roll" class="button"></div>
      </div>
      <ul>
        <li class="item empty" data-chance="0">
          <div class="item-title" placeholder="이름" contenteditable="true"></div>
          <div class="item-weight" data-weight="1"></div>
          <div class="item-weight-add">+</div>
          <div class="item-weight-sub">-</div>
          <div class="item-delete">X</div>
        </li>
      </ul>
    </div>
    <div id="button-tooltip" style="display: none">
      <div><span class="command">Alt + 클릭</span><span class="number">±100</span></div>
      <div><span class="command">Ctrl + 클릭</span><span class="number">±10</span></div>
      <div><span class="command">클릭</span><span class="number">±1</span></div>
    </div>
    <div id="result" style="display: none"></div>
    <script type="text/javascript" src="js/roulette.js"></script>
    <script language="javascript">
      // Check query parameter for OBS layout optimization
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('obs') || urlParams.get('obs') === 'true') {
          // Hide sidebar and center the wheel
          document.querySelector('ul').style.display = 'none';
          document.querySelector('.wrap').style.left = '50%';
          document.querySelector('.wrap').style.transform = 'translateX(-50%)';
          document.querySelector('.container').style.width = '600px';
      }
      
      let gd = null;
      let lastCommandTime = 0;
      
      // SSE connection
      function initSSE() {
          const sse = new EventSource('/api/stream');
          
          const handleData = (data) => {
              gd = data;
              if (!gd.roulette) return;
              
              // 1. Roster and weights calculation
              updateRouletteRoster();
              
              // 2. Command execution
              let cmd = gd.roulette.command;
              let cmdTime = gd.roulette.command_time || 0;
              
              if (cmdTime > lastCommandTime) {
                  lastCommandTime = cmdTime;
                  if (cmd === 'spin') {
                      if (!R.isRolling) {
                          R.isRolling = true;
                          R.Launch();
                          $("#roll").addClass("active").hide(); // Hide button to show cleaner view
                          lock(true);
                      }
                  } else if (cmd === 'stop') {
                      if (R.isRolling) {
                          R.isRolling = false;
                          
                          // 이적/스코어 변동 등으로 인한 인덱스 밀림 방지를 위해 이름으로 인덱스 실시간 재검색
                          let targetIndex = -1;
                          if (gd.roulette.select_name) {
                              let isExtra = gd.extra_game_active || false;
                              let currentRoster = isExtra ? gd.extra_bjs : gd.bjs;
                              targetIndex = currentRoster.findIndex(bj => bj.name === gd.roulette.select_name);
                          }
                          
                          localStorage.selectIndex = targetIndex;
                          R.Stop();
                          $("#roll").removeClass("active").hide();
                      }
                  } else if (cmd === 'reset') {
                      R.isRolling = false;
                      R.rotation = 0;
                      R.angularVelocity = 0;
                      R.dirty = true;
                      $("#roll").removeClass("active").show();
                      lock(false);
                      $("#result").hide().removeClass("play");
                  }
              }
          };
          
          sse.addEventListener('init', function(e) {
              handleData(JSON.parse(e.data));
          });
          
          sse.addEventListener('update', function(e) {
              handleData(JSON.parse(e.data));
          });
          
          sse.onerror = function() {
              sse.close();
              setTimeout(initSSE, 1000);
          };
      }
      
      function updateRouletteRoster() {
          if (!gd || !gd.roulette) return;
          if (window.R && window.R.isRolling) return;
          let isExtra = gd.extra_game_active || false;
          let roster = isExtra ? gd.extra_bjs : gd.bjs;
          
          // Bypasses li.item DOM updates, directly builds items in R
          let items = [];
          let angleSum = 0;
          let weightSum = 0;
          
          if (gd.roulette.weight_type === 'contrib') {
              roster.forEach(bj => {
                  weightSum += Math.max(1, bj.contribution || 0);
              });
          } else {
              weightSum = roster.length;
          }
          
          roster.forEach((bj, i) => {
              let weight = (gd.roulette.weight_type === 'contrib') ? Math.max(1, bj.contribution || 0) : 1;
              let chance = weightSum > 0 ? (weight / weightSum) : 0;
              let angle = 360 * chance;
              angleSum += angle;
              
              let color = getColor(i);
              items.push({
                  name: bj.name,
                  angle: angle,
                  angleSum: angleSum,
                  color: color
              });
          });
          
          R.Items = items;
          R.dirty = true;
      }
      
      // Start SSE
      $(document).ready(function() {
          initSSE();
          
          // Wrap or override onStop to trigger confetti & winner POST
          const originalOnStop = R.onStop;
          R.onStop = function() {
              if (originalOnStop) originalOnStop();
              
              // Reset rolling flag
              R.isRolling = false;
              
              // 1. Confetti
              if (typeof confetti === 'function') {
                  confetti({
                      particleCount: 150,
                      spread: 80,
                      origin: { y: 0.6 }
                  });
              }
              
              // 2. Report winner to backend
              if (R.current) {
                  fetch('/api/roulette/winner', {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ name: R.current })
                  }).catch(e => console.error("Error reporting winner:", e));
              }
          };
      });
    </script>
  </body>
</html>
