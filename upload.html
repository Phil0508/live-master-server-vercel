<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 라이브 마스터 - 리액션 음원/사진 등록 센터</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap');

        :root {
            --bg-color: #0c0c0e;
            --card-bg: rgba(20, 20, 25, 0.6);
            --border-light: rgba(255, 255, 255, 0.08);
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --danger: #ff3b30;
            --text-color: #f5f5f7;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 85, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 35px 30px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), #ff0055);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 42px;
            background: linear-gradient(135deg, var(--accent), #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(0, 255, 204, 0.3));
        }

        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        p.subtitle {
            margin: 6px 0 0 0;
            font-size: 13px;
            color: #8e8e93;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #c7c7cc;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            height: 44px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 0 15px;
            box-sizing: border-box;
            color: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .upload-dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
            position: relative;
        }

        .upload-dropzone:hover {
            border-color: var(--accent);
            background: rgba(0, 255, 204, 0.02);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.05);
        }

        .upload-dropzone i {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
        }

        .upload-dropzone.audio-zone i { color: var(--accent); }
        .upload-dropzone.image-zone i { color: #ff0055; }

        .upload-label {
            font-size: 12px;
            color: #8e8e93;
            word-break: break-all;
        }

        .btn-submit {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, var(--accent) 0%, #00cca3 100%);
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 204, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #2c2c2e;
            color: #8e8e93;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* custom modal alert styling */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: rgba(25, 25, 30, 0.95);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            padding: 30px 24px;
            box-sizing: border-box;
            text-align: center;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-overlay.show .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .modal-icon.success { color: var(--accent); }
        .modal-icon.error { color: var(--danger); }

        .modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .modal-msg {
            font-size: 13px;
            color: #a2a2a6;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .modal-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-icon"><i class="fa-solid fa-compact-disc"></i></div>
            <h1>리액션 음원/사진 등록 센터</h1>
            <p class="subtitle">방송에 쓰일 음원과 사진을 등록해 주세요.</p>
        </div>

        <form id="upload-form" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="title">리액션 제목</label>
                <input type="text" id="title" placeholder="예: 예지랑 제로투, 행복한걸 코카인" required>
            </div>

            <div class="form-group">
                <label for="amount">자동 발동 후원금액 (선택)</label>
                <input type="number" id="amount" placeholder="예: 10000 (해당 후원 금액 입력 시 자동 송출)">
            </div>

            <div class="form-group">
                <label>음원 파일 (.mp3, .wav)</label>
                <div class="upload-dropzone audio-zone" onclick="document.getElementById('audio-file').click()">
                    <i class="fa-solid fa-file-audio"></i>
                    <div id="audio-label" class="upload-label">음원 파일 선택 또는 드래그</div>
                    <input type="file" id="audio-file" accept="audio/*" style="display: none;" onchange="updateLabel('audio-file', 'audio-label')">
                </div>
            </div>

            <div class="form-group">
                <label>사진/움짤 파일 (.png, .jpg, .gif)</label>
                <div class="upload-dropzone image-zone" onclick="document.getElementById('image-file').click()">
                    <i class="fa-solid fa-file-image"></i>
                    <div id="image-label" class="upload-label">이미지 파일 선택 또는 드래그</div>
                    <input type="file" id="image-file" accept="image/*" style="display: none;" onchange="updateLabel('image-file', 'image-label')">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
                <i class="fa-solid fa-cloud-arrow-up"></i> 등록 완료
            </button>
        </form>
    </div>

    <!-- Alert Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-box">
            <div class="modal-icon" id="modal-icon"></div>
            <div class="modal-title" id="modal-title"></div>
            <div class="modal-msg" id="modal-msg"></div>
            <button class="modal-btn" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        function updateLabel(inputId, labelId) {
            const input = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            if (input && input.files && input.files[0]) {
                label.innerText = input.files[0].name;
                label.style.color = 'var(--accent)';
            } else {
                label.innerText = "파일 선택 또는 드래그";
                label.style.color = '#8e8e93';
            }
        }

        function showModal(title, message, isSuccess) {
            const overlay = document.getElementById('modal-overlay');
            const icon = document.getElementById('modal-icon');
            const titleEl = document.getElementById('modal-title');
            const msgEl = document.getElementById('modal-msg');

            if (isSuccess) {
                icon.className = 'modal-icon success';
                icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
            } else {
                icon.className = 'modal-icon error';
                icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }

            titleEl.innerText = title;
            msgEl.innerText = message;
            overlay.classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const title = document.getElementById('title').value.trim();
            const amount = document.getElementById('amount').value || 0;
            const audioFile = document.getElementById('audio-file').files[0];
            const imageFile = document.getElementById('image-file').files[0];

            if (!title) {
                showModal("입력 오류", "제목을 입력해주세요.", false);
                return;
            }

            const formData = new FormData();
            formData.append('title', title);
            formData.append('amount', amount);
            if (audioFile) formData.append('audio', audioFile);
            if (imageFile) formData.append('image', imageFile);

            const submitBtn = document.getElementById('btn-submit');
            const origHtml = submitBtn.innerHTML;
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 등록 중...';

                let res = await fetch('/api/reaction/add', {
                    method: 'POST',
                    body: formData
                });
                let data = await res.json();

                submitBtn.disabled = false;
                submitBtn.innerHTML = origHtml;

                if (data.status === 'success') {
                    showModal("등록 완료", "리액션 정보가 서버에 안전하게 등록되었습니다! 방송 관리자 화면에 즉각 업데이트됩니다.", true);
                    document.getElementById('upload-form').reset();
                    document.getElementById('audio-label').innerText = "음원 파일 선택 또는 드래그";
                    document.getElementById('audio-label').style.color = '#8e8e93';
                    document.getElementById('image-label').innerText = "이미지 파일 선택 또는 드래그";
                    document.getElementById('image-label').style.color = '#8e8e93';
                } else {
                    showModal("등록 실패", data.message || "서버 오류가 발생했습니다.", false);
                }
            } catch (e) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = origHtml;
                showModal("통신 오류", "서버와 연결을 할 수 없습니다: " + e.message, false);
            }
        }
    </script>
</body>
</html>
