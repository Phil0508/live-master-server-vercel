<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🚀 라이브 마스터 오버레이 (새로고침 방어막 패치)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Orbitron:wght@900&display=swap');
        
        :root {
            --text-main: #ffffff; --text-highlight: #FFD700; --text-secondary: #00E5B5;
            --excel-yellow: #FFD700; --excel-dark: rgba(20, 20, 20, 0.85); --excel-border: #FFD700;
            --theme-neon: #ff0055;
            --neon-speed: 2.5s;
            --audi-speed: 1.4s;
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
        }

        body.theme-pink {
            --text-highlight: #ff85a2;
            --text-secondary: #ffa3b1;
            --excel-yellow: #ffb6c1;
            --excel-border: #ffb6c1;
            --theme-neon: #ffb6c1;
            --excel-dark: rgba(30, 20, 25, 0.92);
            --accent: #ff85a2;
            --accent-glow: rgba(255, 133, 162, 0.4);
        }

        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: transparent; font-family: 'Pretendard', sans-serif; overflow: hidden; transition: opacity 0.4s ease-in-out; }
        #scale-wrapper { position: absolute; top: 0; left: 0; width: 1080px; height: 1920px; transform-origin: top left; }
        #master-container { width: 100%; height: 100%; position: relative; will-change: transform; }
        
        .widget-container { 
            position: absolute; transform-origin: top left; 
            /* 🚀 애플 리퀴드 럭셔리 이징(cubic-bezier(0.16, 1, 0.3, 1))을 인가하여 위젯이 미끄러지듯 스르륵 쫀득하게 안착 */
            transition: top 0.8s cubic-bezier(0.16, 1, 0.3, 1), left 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease-in-out, visibility 0.6s ease-in-out; 
            pointer-events: auto; 
        }

        /* --------------------------------------------------
            🌈 일반 네온 레이어
        -------------------------------------------------- */
        .neon-layer { 
            position: fixed; inset: 0; pointer-events: none; z-index: 90000; 
            opacity: 0; visibility: hidden; transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
            padding: 40px; 
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; overflow: hidden;
        }
        .neon-layer.active { opacity: 1; visibility: visible; }
        .neon-layer::before, .neon-layer::after { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; animation: rotateRainbow var(--neon-speed, 2.5s) linear infinite; will-change: transform; display: none; }
        .neon-layer::after { filter: blur(25px); opacity: 0.9; }
        .neon-layer.neon-rainbow::before, .neon-layer.neon-rainbow::after { display: block; background: conic-gradient( #ff0000 0deg, #ff7f00 51deg, #ffff00 102deg, #00ff00 153deg, #0000ff 204deg, #4b0082 255deg, #8b00ff 306deg, #ff0000 360deg ); }
        .neon-layer.neon-single::before, .neon-layer.neon-single::after { display: block; background: conic-gradient( transparent 0deg, var(--glow-color) 90deg, transparent 90deg, transparent 180deg, var(--glow-color) 270deg, transparent 270deg, transparent 360deg ); }
        @keyframes rotateRainbow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --------------------------------------------------
            💡 [신규] 프리미엄 리얼 LED 아우디 라이트 (하얀색 패치)
        -------------------------------------------------- */
        .audi-layer { 
            position: fixed; inset: 0; pointer-events: none; z-index: 89000; 
            opacity: 0; transition: opacity 0.4s ease; 
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px 40px 30px; 
        }
        .audi-layer.active { opacity: 1; }
        .audi-layer.hide { opacity: 0; }
        
        .audi-layer.active::before {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 120px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.2), transparent); 
            filter: blur(20px); z-index: -1;
        }

        .audi-container { display: flex; gap: 15px; }
        .audi-container.right { flex-direction: row-reverse; } 

        .audi-led {
            width: 45px; height: 12px; border-radius: 6px;
            background: rgba(255, 60, 0, 0.1); 
            border: 2px solid rgba(255, 60, 0, 0.3);
            box-shadow: 0 0 10px rgba(255, 60, 0, 0.2);
            position: relative;
        }

        .audi-layer.active .audi-led {
            animation: ledChase var(--audi-speed, 1.4s) infinite;
            animation-delay: calc(var(--idx) * 0.08s); 
        }

        .audi-led::after {
            content: ''; position: absolute;
            bottom: 12px; left: 50%; transform: translateX(-50%) scaleY(0);
            width: 35px; height: 50vh;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.4) 40%, transparent 100%); 
            filter: blur(8px); opacity: 0;
            transform-origin: bottom;
            mix-blend-mode: screen; 
        }
        .audi-layer.active .audi-led::after {
            animation: beamChase var(--audi-speed, 1.4s) infinite;
            animation-delay: calc(var(--idx) * 0.08s);
        }

        @keyframes ledChase {
            0%, 100% { background: rgba(255, 60, 0, 0.1); border-color: rgba(255, 60, 0, 0.3); box-shadow: 0 0 10px rgba(255, 60, 0, 0.2); }
            15%, 40% { 
                background: #ffffff; 
                border-color: #ffffff; 
                box-shadow: 0 0 30px #ffffff, 0 0 60px #ffffff, inset 0 0 15px #ffffff; 
            }
            50% { background: rgba(255, 60, 0, 0.1); border-color: rgba(255, 60, 0, 0.3); box-shadow: 0 0 10px rgba(255, 60, 0, 0.2); }
        }
        @keyframes beamChase {
            0%, 100% { opacity: 0; transform: translateX(-50%) scaleY(0.2); filter: brightness(1) blur(8px); }
            15%, 30% { opacity: 1; transform: translateX(-50%) scaleY(1.1); filter: brightness(2) blur(12px); }
            50% { opacity: 0; transform: translateX(-50%) scaleY(0.5); filter: brightness(1) blur(8px); }
        }

        /* --------------------------------------------------
            기존 UI 디자인 영역
        -------------------------------------------------- */
        .excel-board { background: var(--excel-dark); border: 2px solid var(--excel-border); border-radius: 15px; padding: 12px; width: max-content; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .excel-grid-container { display: flex; gap: 10px; } 
        .excel-col { display: flex; flex-direction: column; width: 330px; }
        .excel-header { background: var(--excel-yellow); color: #000; font-weight: 900; font-size: 16px; display: grid; grid-template-columns: 40px 110px 80px 100px; text-align: center; padding: 6px 0; border-radius: 20px; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .excel-header div { display: flex; align-items: center; justify-content: center; letter-spacing: -0.5px; }
        .excel-row { display: grid; grid-template-columns: 40px 110px 80px 100px; text-align: center; height: 42px; border-bottom: 1px solid rgba(255,255,255,0.15); font-size: 22px; font-weight: 800; align-items: center; padding: 0; }
        .r-rank { color: #fff; font-size: 22px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .r-name { color: #fff; font-weight: 900; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .r-score { color: #fff; position: relative; font-size: 20px; }
        .r-contrib { color: var(--excel-yellow); font-weight: 900; position: relative; text-shadow: 0 0 10px rgba(255,215,0,0.3); font-size: 20px; }
        .rank-1 .r-rank { color: #FFD700; text-shadow: 0 0 10px #FFD700; } .rank-2 .r-rank { color: #E0E0E0; text-shadow: 0 0 10px #E0E0E0; } .rank-3 .r-rank { color: #CD7F32; text-shadow: 0 0 10px #CD7F32; }

        .row-bottom { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: rgba(0, 198, 255, 0.1); border: 1px solid var(--text-secondary); border-radius: 8px; margin-top: 5px; box-shadow: inset 0 0 10px rgba(0, 198, 255, 0.2); }
        .row-bottom .b-name { color: var(--text-secondary); font-weight: 900; font-size: 20px; text-shadow: 0 0 5px var(--text-secondary); }
        .row-bottom .b-score { color: var(--text-secondary); font-weight: 900; font-size: 24px; text-shadow: 0 0 10px var(--text-secondary); position: relative; }

        .excel-gauge-box { background: var(--excel-dark); border: 2px solid var(--excel-border); border-radius: 15px; padding: 15px 20px; min-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .total-row { display: flex; justify-content: space-between; font-size: 22px; font-weight: 900; margin-bottom: 12px; }
        .goal-bar-bg { background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 12px; height: 22px; padding: 3px; position: relative; }
        .goal-bar-fill { background: linear-gradient(90deg, #ff0055, #ff5500); height: 100%; border-radius: 8px; width: 0%; transition: width 0.8s ease; box-shadow: 0 0 15px #ff0055; }
        .goal-text { display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; color: #ccc; margin-top: 8px; }

        .acc-box-v2 { background: var(--excel-dark); border: 2px solid var(--excel-yellow); border-radius: 15px; padding: 15px 20px; width: 280px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .acc-top { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; } 
        .acc-bank-tag { background: var(--excel-yellow); color: #000; font-weight: 900; font-size: 18px; padding: 4px 10px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); } 
        .acc-name-tag { color: #fff; font-size: 18px; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); } 
        .acc-num-v2 { font-size: 38px; font-weight: 900; color: #fff; letter-spacing: 1px; text-shadow: 3px 3px 6px rgba(0,0,0,0.9); word-break: break-all; line-height: 1.2; }

        /* --------------------------------------------------
            ⚔️ 퓨처리스트 네온 아크릴 대결판 (리뉴얼)
        -------------------------------------------------- */
        .match-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 25px; 
        } 
        
        /* 메카닉 타이머 캡슐 */
        .m-timer-pill { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px); 
            border: 2px solid rgba(255,255,255,0.4); 
            border-radius: 40px; 
            padding: 8px 35px; 
            color: #fff; 
            font-size: 40px; 
            font-weight: 900; 
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            transition: all 0.2s linear; 
        }

        .m-team-container { 
            display: flex; 
            gap: 25px; 
            min-width: 290px; /* 450px는 너무 벌어지는 문제 해결: 290px로 콤팩트하면서 시간이랑 절대 안 겹치게 미세 조정 */
            justify-content: center; /* 1명만 있거나 할 때도 정가운데 정렬 */
        } 
        
        .m-team-box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            transition: transform 0.2s ease;
        } 
        
        /* 영롱한 네온 아크릴 쉴드 스코어 보드 */
        .m-score-box { 
            background: rgba(15, 15, 22, 0.65); 
            backdrop-filter: blur(16px) saturate(180%); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            width: 200px; 
            height: 110px; 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif;
            font-size: 55px; 
            font-weight: 900; 
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 0 15px rgba(255,255,255,0.05); 
            position: relative; 
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        } 

        /* 쫀득한 3D 바운스 및 네온 에너지 벌크업 충전 애니메이션 */
        .m-score-box.score-bump {
            animation: scoreBumpAnimation 0.8s cubic-bezier(0.25, 1.5, 0.5, 1) forwards;
        }
        @keyframes scoreBumpAnimation {
            0% { transform: scale(1); }
            20% { transform: scale(1.22) translateY(-10px); }
            40% { transform: scale(0.92) translateY(3px); }
            65% { transform: scale(1.05) translateY(-2px); }
            80% { transform: scale(0.98) translateY(0); }
            100% { transform: scale(1); }
        }

        /* 쉴드 테두리 반짝임 네온 아우라 그라데이션 */
        .m-score-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            padding: 2px;
            background: linear-gradient(to bottom, var(--team-color, #444), transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.85;
            box-shadow: 0 0 20px var(--team-color, transparent);
        }

        /* 메카닉 이름표 배지 */
        .m-name-box { 
            background: #0d0d12; 
            color: #ffffff; 
            font-family: 'Chakra Petch', sans-serif;
            font-size: 24px; 
            font-weight: 800; 
            padding: 8px 30px; 
            border: 2px solid var(--team-color, #444); 
            border-radius: 30px; 
            margin-top: -22px; 
            z-index: 2; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.6); 
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }
        
        .m-team-box:hover .m-score-box {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 15px var(--team-color);
        }
        .m-team-box:hover .m-name-box {
            background: var(--team-color);
            color: #000;
            text-shadow: none;
            box-shadow: 0 8px 25px var(--team-color);
        }

        @keyframes explodeTimer { 0% { transform: scale(1.3); opacity: 1; filter: drop-shadow(0 0 20px #ff0000); color: #ff0000; background: rgba(255,0,0,0.5); } 20% { transform: scale(1.6); opacity: 1; filter: drop-shadow(0 0 50px #ff5500); color: #fff; background: #ff0000; border-color: #fff; } 100% { transform: scale(0); opacity: 0; filter: drop-shadow(0 0 100px #ffff00); } }
        .timer-explode { animation: explodeTimer 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
        .score-pop { position: absolute; right: -20px; top: -15px; color: var(--theme-neon); font-weight: 900; font-size: 22px; text-shadow: 0 0 10px var(--theme-neon); animation: fu 1s ease-out forwards; z-index:100; pointer-events:none; } @keyframes fu { 0%{opacity:1; transform:translateY(0) scale(1)} 50%{transform:translateY(-15px) scale(1.2)} 100%{opacity:0; transform:translateY(-30px) scale(1)} }
        
        .center-popup-content { background: rgba(0, 0, 0, 0.9); border: 4px solid var(--text-secondary); border-radius: 50px; padding: 15px 60px; font-size: 36px; font-weight: 900; color: white; white-space: nowrap; box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 25px var(--text-secondary); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; transform: translateY(30px) scale(0.8); } 
        .center-popup-content.show { opacity: 1; transform: translateY(0) scale(1); }
        
        .takeover-popup-content { background: rgba(0, 0, 0, 0.95); border: 4px solid var(--theme-neon); border-radius: 50px; padding: 15px 60px; font-size: 40px; font-weight: 900; color: white; white-space: nowrap; box-shadow: inset 0 0 30px var(--theme-neon); opacity: 0; transition: 0.4s; transform: translateY(40px) scale(0.7); } .takeover-popup-content.show { opacity: 1; transform: translateY(0) scale(1); }
        
        .ticker-bar { width: 1080px; height: 70px; background: rgba(0, 0, 0, 0.7); border-top: 2px solid var(--theme-neon); border-bottom: 2px solid var(--theme-neon); display: flex; align-items: center; overflow: hidden; backdrop-filter: blur(8px); box-shadow: 0 5px 20px rgba(0,0,0,0.5);} .ticker-text-wrap { white-space: nowrap; display: inline-block; font-size: 40px; font-weight: 900; color: #fff; text-shadow: 2px 2px 8px rgba(0,0,0,0.9); animation: tickerAnim var(--ticker-speed, 15s) linear infinite; } @keyframes tickerAnim { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-50%, 0, 0); } }
        
        #ui-layer { position: absolute; inset: 0; width: 100%; height: 100%; transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out; color: var(--text-main); pointer-events: none; } 
        /* 대결 컨테이너: 기본 숨김, .match-visible 클래스로만 표시 */
        #match-container { transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out; }
        /* 리액션 모드: 모든 위젯 강제 숨김 */
        body.reaction-mode #ui-layer,
        body.reaction-mode #match-container { opacity: 0 !important; visibility: hidden !important; }

        .fire-vignette { position: fixed; inset: 0; pointer-events: none; z-index: 5; opacity: 0; visibility: hidden; transition: opacity 0.6s ease-in-out; box-shadow: inset 0 0 150px rgba(255, 30, 0, 0.6), inset 0 0 50px rgba(255, 0, 0, 0.4); animation: firePulse 2s infinite alternate ease-in-out; } body.match-fire-on .fire-vignette { opacity: 1; visibility: visible; } @keyframes firePulse { 0% { box-shadow: inset 0 0 80px rgba(255, 30, 0, 0.4), inset 0 0 20px rgba(255, 0, 0, 0.2); } 100% { box-shadow: inset 0 0 180px rgba(255, 50, 0, 0.8), inset 0 0 70px rgba(255, 20, 0, 0.6); } }
        .up-message { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.3); opacity: 0; font-size: 110px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px #ff0055, 0 0 50px #ff0055, 5px 5px 0px #000; z-index: 100000; pointer-events: none; white-space: nowrap; transition: 0.4s; } .up-message.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        .time-up-message { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0.3); opacity: 0; font-size: 130px; font-weight: 900; color: #fff; text-shadow: 0 0 20px #ff0055, 0 0 40px #ff0055, 0 0 80px #ff0055, 6px 6px 0px #000; z-index: 100000; pointer-events: none; white-space: nowrap; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .time-up-message.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        #toon-popup-container {
            position: absolute !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; z-index: 100005; pointer-events: none;
        }
        .donation-popup-content { background: rgba(20, 20, 25, 0.95); border: 4px solid #ff0055; border-radius: 20px; padding: 40px 60px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 85, 0.6), inset 0 0 20px rgba(255, 0, 85, 0.4); opacity: 0; visibility: hidden; transform: scale(0.8) translateY(30px); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.5s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 500px; }
        .donation-popup-content.show { opacity: 1; visibility: visible; transform: scale(1) translateY(0); }
        .donator-text { font-size: 36px; font-weight: 800; color: #ffffff; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .donator-name { color: #ff3366; text-shadow: 0 0 15px rgba(255, 51, 102, 0.8); }
        .donation-amount { font-size: 70px; font-weight: 900; color: #FFD700; text-shadow: 0 0 20px #FFD700, 0 0 40px #ffaa00; margin: 15px 0; letter-spacing: -2px; }
        .donation-message { background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px; padding: 15px 35px; font-size: 28px; font-weight: 700; color: #ffffff; max-width: 700px; word-break: break-all; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="fire-vignette" class="fire-vignette"></div>
    <div id="neon-overlay" class="neon-layer"></div>
    
    <div id="audi-overlay" class="audi-layer">
        <div class="audi-container left">
            <div class="audi-led" style="--idx: 0"></div>
            <div class="audi-led" style="--idx: 1"></div>
            <div class="audi-led" style="--idx: 2"></div>
            <div class="audi-led" style="--idx: 3"></div>
            <div class="audi-led" style="--idx: 4"></div>
            <div class="audi-led" style="--idx: 5"></div>
            <div class="audi-led" style="--idx: 6"></div>
            <div class="audi-led" style="--idx: 7"></div>
        </div>
        <div class="audi-container right">
            <div class="audi-led" style="--idx: 0"></div>
            <div class="audi-led" style="--idx: 1"></div>
            <div class="audi-led" style="--idx: 2"></div>
            <div class="audi-led" style="--idx: 3"></div>
            <div class="audi-led" style="--idx: 4"></div>
            <div class="audi-led" style="--idx: 5"></div>
            <div class="audi-led" style="--idx: 6"></div>
            <div class="audi-led" style="--idx: 7"></div>
        </div>
    </div>

    <div id="scale-wrapper">
        <div id="master-container"> 
            <div id="up-message-layer" class="up-message">UP!</div>

        }
        document.addEventListener('click', initAudio, { once: true });

        function playBeep(freq, type, dur, vol) {
            try {
                if(!audioCtx) return; if(audioCtx.state === 'suspended') audioCtx.resume();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) { console.warn("Beep audio play blocked:", e); }
        }
        
        function playExplosion() {
            try {
                if(!audioCtx) return; if(audioCtx.state === 'suspended') audioCtx.resume();
                let bufferSize = audioCtx.sampleRate * 2.0; let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                let data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                let noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 800; 
                let gain = audioCtx.createGain();
                gain.gain.setValueAtTime(2.0, audioCtx.currentTime);

                noise.start();
            } catch(e) { console.warn("Explosion audio play blocked:", e); }
        }

        let lastBeepSec = -1; let timerExploded = false;

        function resizeOverlay() { const wrapper = document.getElementById('scale-wrapper'); const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920); wrapper.style.transform = `scale(${scale})`; wrapper.style.left = `${(window.innerWidth - 1080 * scale) / 2}px`; wrapper.style.top = `${(window.innerHeight - 1920 * scale) / 2}px`; } window.addEventListener('resize', resizeOverlay); resizeOverlay();
        function formatNum(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function safeId(n) { return 'bj-' + btoa(unescape(encodeURIComponent(n))).replace(/=/g, ''); }
        
        function animateVal(el, start, end, dur) { 
            let startT = null; 
            const step = (ts) => { 
                if (!startT) startT = ts; 
                const prog = Math.min((ts - startT) / dur, 1); 
                const cur = Math.floor((1 - Math.pow(1 - prog, 3)) * (end - start) + start); 
                el.innerText = formatNum(cur); 
                if (prog < 1) window.requestAnimationFrame(step); 
                else el.innerText = formatNum(end); 
            }; 
            window.requestAnimationFrame(step); 
        }
        
        function popScore(el, diff) { const p = document.createElement('div'); p.className = 'score-pop'; p.innerText = '+' + formatNum(diff); el.appendChild(p); setTimeout(() => p.remove(), 1000); }
        
        let lastLayoutData = null; // 전역 레이아웃 캐시
        function applyLayout(ly) { 
            if (ly) lastLayoutData = ly;
            let isExtra = (currentExtraActiveState === true);
            
            ['ranking', 'gauge', 'account', 'match', 'popup', 'takeover', 'ticker_top', 'ticker_bottom', 'roulette'].forEach(id => {

            // 번외 점수판 슬라이딩 처리
            const extraEl = document.getElementById('extra-ranking-container');
            if (extraEl && ly && ly['ranking']) {

                extraEl.style.left = isExtra ? ((ly['ranking'].x_px || 0) + 'px') : '1500px';

        }

        let isFirstLoadOverlay = true; // 💡 여기에 방어막 변수 추가!
        let matchData = null;
        let globalData = null;
        let serverTimeOffset = 0;
        
        let currentExtraActiveState = false;
        function handleData(d) {
            if (d && d.server_time) {
                serverTimeOffset = d.server_time - Date.now();
            }
            globalData = d;
            
            let isActive = d.broadcast_active || false;
            ['ranking', 'gauge', 'account', 'match', 'roulette', 'extra-ranking'].forEach(id => {
                const el = document.getElementById(id + '-container');
                if (el) el.style.display = isActive ? '' : 'none';

            if (!isActive) return;
            
            try {
                // 🎨 실시간 테마 스위칭
                if (d.theme === 'pink') {
                    document.body.classList.add('theme-pink');
                } else {

                // 💡 [실시간 조명 속도 슬라이더 연동]

                let extraActive = d.extra_game_active || false;

                // ==========================================

                if (lastExtraRosterStr !== extraRosterStr) {
                    lastExtraRosterStr = extraRosterStr;
                    
                    let leftCount = Math.max(3, Math.ceil(extraBjs.length / 2));
                    let leftHtml = ''; let rightHtml = '';
                    
                    for(let i=0; i<leftCount; i++) {
                        if(i < extraBjs.length) {
                            let b = extraBjs[i]; let id = 'ex-' + safeId(b.name); let rankStr = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
                            let rowClass = i < 3 ? `rank-${i+1}` : '';
                            leftHtml += `<div class="excel-row ${rowClass}" id="${id}"><div class="r-rank" style="color:#ff3366;">${rankStr}</div><div class="r-name">${b.name}</div><div class="r-score" id="sc-${id}">${formatNum(b.score)}</div><div class="r-contrib" id="cb-${id}" style="color:#ff85a2;">${formatNum(b.contribution || 0)}</div></div>`;
                        } else { leftHtml += `<div class="excel-row"><div class="r-rank">-</div><div class="r-name"></div><div class="r-score"></div><div class="r-contrib"></div></div>`; }
                    }
                    for(let i=leftCount; i<leftCount*2; i++) {

                        } else { rightHtml += `<div class="excel-row"><div class="r-rank">-</div><div class="r-name"></div><div class="r-score"></div><div class="r-contrib"></div></div>`; }
                    }

                    document.getElementById('extra-rank-left').innerHTML = leftHtml; 
                    document.getElementById('extra-rank-right').innerHTML = rightHtml;
                    
                    extraBjs.forEach(b => {
                        let id = 'ex-' + safeId(b.name);

                    ctx.strokeText(this.current, w / 2, this.center.y - this.radius - 25);
                    ctx.fillStyle = strokeCol;
                    ctx.fillText(this.current, w / 2, this.center.y - this.radius - 25);
                }
                
                this.ctx.drawImage(this.bufferCanvas, 0, 0);
            },

            onStop() {
                if (typeof confetti === 'function') {
                    confetti({
                        particleCount: 150,
                        spread: 80,
                        origin: { y: 0.6 }
                    });
                }
                
                if (this.current) {
                    fetch('/api/roulette/winner', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: this.current })
                    }).catch(e => console.error("Error reporting winner:", e));
                }
                
                // 대결모드 시간종료처럼 결과를 가운데 크게 띄우기 (이모지 제외)
                const winMsgEl = document.getElementById('roulette-winner-message-layer');
                if (winMsgEl && this.current) {
                    winMsgEl.innerText = `${this.current} 당첨!`;
                    winMsgEl.classList.remove('show');
                    void winMsgEl.offsetWidth;
                    winMsgEl.classList.add('show');
                    setTimeout(() => { winMsgEl.classList.remove('show'); }, 4000);
                }
                
                // 당첨 시 즉시 룰렛위젯 꺼짐 처리 (로컬 상태만 업데이트, 실제 비활성화는 winner API 완료 시 SSE로 자동 동기화)
                if (globalData) {
                    globalData.roulette_enabled = false;
                }
            }
        };

        let lastRouletteCommandTime = 0;
        let isRouletteWidgetShown = false;

        function handleRouletteState(d) {
            const rState = d.roulette;
            
            // 1. Roster & weights 동적 계산
            let isExtra = d.extra_game_active || false;
            let itemSource = rState.item_source || 'bj';
            let roster = [];
            
            if (itemSource === 'custom') {
                roster = (rState.custom_items || []).map(name => ({ name: name, contribution: 0 }));
            } else {
                roster = isExtra ? d.extra_bjs : d.bjs;
            }
            RouletteWidget.updateRoster(roster, rState.weight_type);
            
            // 2. 수동 토글 감지 (ON/OFF)
            if (d.roulette_enabled) {
                if (!isRouletteWidgetShown) {
                    showRouletteWidget();
                }
            } else {
                // 토글이 꺼졌는데 회전 중이 아니라면 화면에서 즉시 내림
                if (isRouletteWidgetShown && !RouletteWidget.isRolling) {
                    hideRouletteWidget();
                }
            }
            
            // 3. 시작/정지 명령어 핸들링
            let cmd = rState.command;
            let cmdTime = rState.command_time || 0;
            
            if (cmdTime > lastRouletteCommandTime) {
                lastRouletteCommandTime = cmdTime;
                
                if (cmd === 'spin') {
                    showRouletteWidget(); // 시작 시 무조건 위젯 강제 표출
                    RouletteWidget.launch();
                } else if (cmd === 'stop') {
                    // 이름 일치 인덱스 실시간 추적
                    let targetIndex = -1;
                    if (rState.select_name) {
                        targetIndex = roster.findIndex(bj => bj.name === rState.select_name);
                    }
                    RouletteWidget.stop(targetIndex);
                } else if (cmd === 'reset') {
                    RouletteWidget.rotation = 0;
                    RouletteWidget.angularVelocity = 0;
                    RouletteWidget.isRolling = false;
                    RouletteWidget.launched = false;
                    RouletteWidget.stopping = null;
                    if (!d.roulette_enabled) {
                        hideRouletteWidget();
                    }
                }
            }
        }

        function showRouletteWidget() {
            isRouletteWidgetShown = true;
            const container = document.getElementById('roulette-container');
            const backdrop = document.getElementById('roulette-overlay-backdrop');
            if (container) {
                container.style.opacity = '1';
                container.style.visibility = 'visible';
                
                let scale = 1.0;
                if (lastLayoutData && lastLayoutData['roulette']) {
                    scale = lastLayoutData['roulette'].scale || 1.0;
                }
                container.style.transform = `scale(${scale * 1.1})`;
            }
            if (backdrop) {
                backdrop.style.opacity = '1';
                backdrop.style.visibility = 'visible';
            }
        }

        function hideRouletteWidget() {
            isRouletteWidgetShown = false;
            const container = document.getElementById('roulette-container');
            const backdrop = document.getElementById('roulette-overlay-backdrop');
            if (container) {
                container.style.opacity = '0';
                container.style.visibility = 'hidden';
                
                let scale = 1.0;
                if (lastLayoutData && lastLayoutData['roulette']) {
                    scale = lastLayoutData['roulette'].scale || 1.0;
                }
                container.style.transform = `scale(${scale})`;
            }
            if (backdrop) {
                backdrop.style.opacity = '0';
                backdrop.style.visibility = 'hidden';
            }
        }

        // 초기화
        RouletteWidget.init();

        let sseSource = null;
        function initSSE() {
            if (sseSource) {
                sseSource.close();
            }
            sseSource = new EventSource('/api/stream');
            
            sseSource.addEventListener('init', function(e) {
                const newData = JSON.parse(e.data);
                handleData(newData);
            });
            
            sseSource.addEventListener('update', function(e) {
                const newData = JSON.parse(e.data);
                handleData(newData);
            });
            
            sseSource.addEventListener('layout', function(e) {
                const layoutData = JSON.parse(e.data);
                applyLayout(layoutData);
            });
            
            sseSource.onerror = function(err) {
                console.error("SSE connection error. Retrying in 3 seconds...", err);
                sseSource.close();
                setTimeout(initSSE, 3000);
            };
        }

        initSSE();
    </script>
</body>
</html>
