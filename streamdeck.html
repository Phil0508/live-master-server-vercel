<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>🎛️ 가상 스트림덱 (Virtual Stream Deck)</title>
    <!-- 폰트 및 아이콘 CDN 로드 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Orbitron:wght@800&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #18181c 0%, #0c0c0e 100%);
            font-family: 'Pretendard', sans-serif;
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 전체 컨테이너 */
        .deck-wrapper {
            width: 90%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 상단 헤더 */
        .deck-header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 5px;
        }
        .deck-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            margin: 0;
        }
        .deck-subtitle {
            font-size: 11px;
            color: #8e8e93;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* 3행 2열 그리드 패드 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            width: 100%;
        }

        /* 영롱한 글라스모피즘 버튼 디자인 */
        .deck-btn {
            aspect-ratio: 1.35 / 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            outline: none;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-tap-highlight-color: transparent;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.02), 0 8px 16px rgba(0,0,0,0.3);
        }

        /* 터치 및 마우스 반응 */
        .deck-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.08);
        }

        /* 아이콘 디자인 */
        .deck-btn i {
            font-size: 28px;
            transition: transform 0.2s ease;
        }
        .deck-btn:active i {
            transform: scale(1.15);
        }

        /* 버튼 텍스트 */
        .btn-label {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            font-family: 'Chakra Petch', sans-serif;
            text-transform: uppercase;
        }

        /* 💾 버튼 개별 테마 (세이브) */
        .btn-save {
            --glow-color: #9c27b0;
            border-color: rgba(156, 39, 176, 0.25);
        }
        .btn-save i { color: #e040fb; filter: drop-shadow(0 0 8px rgba(224, 64, 251, 0.6)); }
        .btn-save .btn-label { color: #e040fb; }
        .btn-save:hover { box-shadow: 0 0 20px rgba(156, 39, 176, 0.35); border-color: #9c27b0; }

        /* 🌈 버튼 개별 테마 (무지개 네온) */
        .btn-rainbow {
            border-color: rgba(255, 255, 255, 0.15);
        }
        .btn-rainbow i {
            background: linear-gradient(45deg, #ff0055, #00ffcc, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.4));
        }
        .btn-rainbow .btn-label {
            background: linear-gradient(45deg, #ff0055, #00ffcc, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-rainbow:hover { box-shadow: 0 0 20px rgba(0, 255, 204, 0.35); border-color: #00ffcc; }

        /* 💡 버튼 개별 테마 (아우디) */
        .btn-audi {
            --glow-color: #ffffff;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-audi i { color: #ffffff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); }
        .btn-audi .btn-label { color: #ffffff; }
        .btn-audi:hover { box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); border-color: #ffffff; }

        /* ❌ 버튼 개별 테마 (조명 오프) */
        .btn-off {
            --glow-color: #ff3366;
            border-color: rgba(255, 51, 102, 0.25);
        }
        .btn-off i { color: #ff3366; filter: drop-shadow(0 0 8px rgba(255, 51, 102, 0.6)); }
        .btn-off .btn-label { color: #ff3366; }
        .btn-off:hover { box-shadow: 0 0 20px rgba(255, 51, 102, 0.35); border-color: #ff3366; }

        /* 🟢 버튼 개별 테마 (민트 단색) */
        .btn-mint {
            --glow-color: #00E5B5;
            border-color: rgba(0, 229, 181, 0.25);
        }
        .btn-mint i { color: #00E5B5; filter: drop-shadow(0 0 8px rgba(0, 229, 181, 0.6)); }
        .btn-mint .btn-label { color: #00E5B5; }
        .btn-mint:hover { box-shadow: 0 0 20px rgba(0, 229, 181, 0.35); border-color: #00E5B5; }

        /* 🟣 버튼 개별 테마 (핑크 단색) */
        .btn-pink {
            --glow-color: #ff0055;
            border-color: rgba(255, 0, 85, 0.25);
        }
        .btn-pink i { color: #ff0055; filter: drop-shadow(0 0 8px rgba(255, 0, 85, 0.6)); }
        .btn-pink .btn-label { color: #ff0055; }
        .btn-pink:hover { box-shadow: 0 0 20px rgba(255, 0, 85, 0.35); border-color: #ff0055; }

        /* 🎨 버튼 개별 테마 (커스텀 색상 선택) */
        .btn-custom {
            --glow-color: #ffcc00;
            border-color: rgba(255, 204, 0, 0.25);
        }
        .btn-custom i { color: #ffcc00; filter: drop-shadow(0 0 8px rgba(255, 204, 0, 0.6)); }
        .btn-custom .btn-label { color: #ffcc00; }
        .btn-custom:hover { box-shadow: 0 0 20px rgba(255, 204, 0, 0.35); border-color: #ffcc00; }

        /* 플로팅 토스트 메시지 */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translate(-50%, 50px);
            background: rgba(12, 12, 14, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 13.5px;
            font-weight: 700;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body>

    <div class="deck-wrapper">
        <div class="deck-header">
            <h1 class="deck-title">가상 스트림덱</h1>
            <div class="deck-subtitle">로컬 방송 무인 컨트롤 타워</div>
        </div>

        <div class="button-grid">
            <!-- 💾 수동 백업 세이브 -->
            <button class="deck-btn btn-save" onclick="triggerAPI('/api/streamdeck/save', '💾 수동 스냅샷 세이브 성공!')">
                <i class="fa-solid fa-floppy-disk"></i>
                <span class="btn-label">세이브포인트 저장</span>
            </button>

            <!-- 🌈 무지개 네온 -->
            <button class="deck-btn btn-rainbow" onclick="triggerAPI('/api/streamdeck/neon?color=RAINBOW', '🌈 무지개 네온 조명 가동!')">
                <i class="fa-solid fa-rainbow"></i>
                <span class="btn-label">무지개 조명</span>
            </button>

            <!-- 💡 아우디 라이트 -->
            <button class="deck-btn btn-audi" onclick="triggerAPI('/api/streamdeck/neon?color=AUDI', '💡 아우디 LED 라이트 가동!')">
                <i class="fa-solid fa-lightbulb"></i>
                <span class="btn-label">아우디 LED</span>
            </button>

            <!-- ❌ 모든 조명 끄기 -->
            <button class="deck-btn btn-off" onclick="triggerAPI('/api/streamdeck/neon?color=OFF', '❌ 조명 및 리액션 차단 완료!')">
                <i class="fa-solid fa-power-off"></i>
                <span class="btn-label">모든 조명 끄기</span>
            </button>

            <!-- 🟢 민트 네온 -->
            <button class="deck-btn btn-mint" onclick="triggerAPI('/api/streamdeck/neon?color=%2300E5B5', '🟢 민트 단색 네온 전환!')">
                <i class="fa-solid fa-circle" style="font-size:20px;"></i>
                <span class="btn-label">민트색 아우라</span>
            </button>

            <!-- 🎨 커스텀 색상 선택 -->
            <button class="deck-btn btn-custom" onclick="document.getElementById('color-picker').click()">
                <i class="fa-solid fa-palette"></i>
                <span class="btn-label">커스텀 색상 선택</span>
                <input type="color" id="color-picker" style="display:none;" onchange="triggerCustomColor(this.value)">
            </button>
        </div>
    </div>

    <!-- 토스트 컴포넌트 -->
    <div id="deck-toast" class="toast">
        <span id="toast-text">성공!</span>
    </div>

    <script>
        let toastTimer = null;
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            window.apiToken = urlToken;
        }

        const originalFetch = window.fetch;
        window.fetch = function(resource, init) {
            if (window.apiToken && typeof resource === 'string' && resource.startsWith('/api/')) {
                init = init || {};
                init.headers = init.headers || {};
                if (init.headers instanceof Headers) {
                    init.headers.set('Authorization', 'Bearer ' + window.apiToken);
                } else {
                    init.headers['Authorization'] = 'Bearer ' + window.apiToken;
                }
            }
            return originalFetch(resource, init);
        };

        // 커스텀 색상 변경 호출
        function triggerCustomColor(hexColor) {
            let encodedColor = encodeURIComponent(hexColor);
            triggerAPI('/api/streamdeck/neon?color=' + encodedColor, '🎨 커스텀 조명 (' + hexColor + ') 전환 완료!');
        }

        // 햅틱 진동 및 API 호출 유틸리티
        function triggerAPI(url, successMsg) {
            // 1. 모바일 기기 햅틱 피드백 (진동 API)
            if (navigator.vibrate) {
                navigator.vibrate(60); 
            }

            // 2. 비동기 GET API 요청
            fetch(url)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        showToast(successMsg, true);
                    } else {
                        showToast("❌ API 실행 실패: " + data.message, false);
                    }
                })
                .catch(err => {
                    showToast("❌ 연결 오류: 서버가 구동 중인지 확인하세요.", false);
                    console.error("VSD API Error:", err);
                });
        }

        // 토스트 출력 함수
        function showToast(message, isSuccess) {
            const toast = document.getElementById('deck-toast');
            const toastText = document.getElementById('toast-text');
            
            toastText.innerText = message;
            
            if (isSuccess) {
                toast.style.borderColor = "rgba(0, 255, 204, 0.4)";
                toast.style.boxShadow = "0 10px 25px rgba(0, 255, 204, 0.15)";
            } else {
                toast.style.borderColor = "rgba(255, 51, 102, 0.4)";
                toast.style.boxShadow = "0 10px 25px rgba(255, 51, 102, 0.15)";
            }

            toast.classList.remove('show');
            void toast.offsetWidth; // 리플로우 강제
            toast.classList.add('show');

            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1800);
        }
    </script>
</body>
</html>
